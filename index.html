<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Store | Пилососи Jet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-flex">
            <span class="logo">SAMSUNG</span>
            <a href="cart.html" class="cart-link">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </a>
        </div>
    </header>

    <main class="container">
        <section class="page-hero">
            <h1>Пилососи Jet</h1>
            <p>Чистота, яка надихає.</p>
        </section>

        <div class="product-grid">
            <div class="product-card">
                <div class="product-card-image">
                    <img src="https://images.samsung.com/is/image/samsung/p6pim/ua/vs80f28dgs-uk/gallery/ua-bespoke-jet-ai-lite-280w-vs9500al-vs80f28dgs-uk-547941349?$Q90_1920_1280_F_PNG$" alt="Jet AI Lite">
                </div>
                <div class="product-card-content">
                    <h4>Bespoke AI Jet Lite</h4>
                    <p class="product-price">29 999 ₴</p>
                    <button class="buy-btn" data-id="jet-lite" data-name="Bespoke AI Jet Lite" data-price="29999">Додати в кошик</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-card-image">
                    <img src="https://images.samsung.com/is/image/samsung/p6pim/ua/vs90f40dek-uk/gallery/ua-bespokejetaiultra-400w-vc9700cl-vs90f40dek-uk-545747064?$Q90_1920_1280_F_PNG$" alt="Jet AI Ultra">
                </div>
                <div class="product-card-content">
                    <h4>Bespoke AI Jet Ultra</h4>
                    <p class="product-price">39 999 ₴</p>
                    <button class="buy-btn" data-id="jet-ultra" data-name="Bespoke AI Jet Ultra" data-price="39999">Додати в кошик</button>
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
